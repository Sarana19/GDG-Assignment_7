<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Exercises</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>This is a red heading</h1>

    <p>This is a blue paragraph</p>

    <div class="box">This is a gray box</div>

    <div id="main">This text is green (main id)</div>

    <div class="same-class">Element 1 (same class)</div>
    <div class="same-class">Element 2 (same class)</div>

    <div id="unique">This is a unique element</div>

    <p class="hex">This text uses HEX color</p>
    <p class="rgb">This text uses RGB color</p>
    <p class="rgba">This text uses RGBA with transparency</p>

</body>
</html>
